name: Release

# Manually triggered full release: validates the version, runs the test gate
# (unit and live system tests), packs the NuGet package with the requested
# version, pushes it to nuget.org, creates the vX.Y.Z tag, and publishes a
# GitHub Release whose notes are taken from the matching section of
# CHANGELOG.md.
#
# The CHANGELOG must already contain a "## [X.Y.Z] - <date>" section for the
# version being released.
#
# Publishing uses NuGet Trusted Publishing (OIDC) instead of a long-lived API
# key: on nuget.org, under your account > Trusted Publishing, add a policy with
# Repository Owner "ipregistry", Repository "ipregistry-dotnet", and Workflow
# File "release.yml". The workflow then exchanges a GitHub OIDC token for a
# short-lived (1 hour) API key at publish time.
#
# Required secrets:
#   NUGET_USER         the nuget.org profile name owning the Trusted Publishing
#                      policy (a username, not an email address)
#   IPREGISTRY_API_KEY a valid Ipregistry API key for the system-test gate
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version, e.g. 1.2.0 or v1.2.0'
        required: true
        type: string

permissions:
  contents: write
  id-token: write # OIDC token issuance for NuGet Trusted Publishing

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Validate version
        # The raw input is passed through the environment (never interpolated
        # into the shell) and strictly validated before any further use.
        env:
          VERSION_INPUT: ${{ inputs.version }}
        run: |
          set -euo pipefail
          version="${VERSION_INPUT#v}"
          if ! printf '%s' "$version" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.]+)?$'; then
            echo "::error::Invalid version '$VERSION_INPUT'. Expected semver such as 1.2.0 or v1.2.0."
            exit 1
          fi
          echo "VERSION=$version" >> "$GITHUB_ENV"
          echo "TAG=v$version" >> "$GITHUB_ENV"

      - name: Ensure tag does not already exist
        run: |
          set -euo pipefail
          if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            echo "::error::Tag $TAG already exists locally."
            exit 1
          fi
          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "::error::Tag $TAG already exists on the remote."
            exit 1
          fi

      - name: Extract changelog section
        run: |
          set -euo pipefail
          awk -v ver="$VERSION" '
            $0 ~ ("^## \\[" ver "\\]") { capture=1; next }
            capture && (/^## / || /^\[[^][]+\]:[[:space:]]/) { exit }
            capture { print }
          ' CHANGELOG.md | sed -e '/./,$!d' > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "::error::No changelog section found for [$VERSION] in CHANGELOG.md."
            exit 1
          fi
          echo "Release notes for $TAG:"
          echo "----------------------------------------"
          cat release-notes.md
          echo "----------------------------------------"

      - name: Build and run unit tests
        run: |
          dotnet build Ipregistry.slnx --configuration Release -p:Version="$VERSION"
          dotnet test tests/Ipregistry.Tests --configuration Release --no-build

      - name: Run system tests (live API)
        env:
          IPREGISTRY_API_KEY: ${{ secrets.IPREGISTRY_API_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${IPREGISTRY_API_KEY:-}" ]; then
            echo "::error::IPREGISTRY_API_KEY secret is required to run system tests before a release."
            exit 1
          fi
          dotnet test tests/Ipregistry.SystemTests --configuration Release --no-build

      - name: Pack
        run: >
          dotnet pack src/Ipregistry --configuration Release --no-build
          -p:Version="$VERSION" --output artifacts

      - name: NuGet login (OIDC -> temp API key)
        uses: NuGet/login@v1
        id: nuget-login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push to NuGet
        env:
          NUGET_API_KEY: ${{ steps.nuget-login.outputs.NUGET_API_KEY }}
        run: |
          set -euo pipefail
          dotnet nuget push "artifacts/Ipregistry.$VERSION.nupkg" \
            --api-key "$NUGET_API_KEY" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

      - name: Create tag and GitHub release
        # If an organization rule blocks the default Actions token from creating
        # v*-prefixed tags, provide a RELEASE_TOKEN secret (a PAT owned by a user
        # allowed to create such tags, with Contents: write).
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          prerelease=""
          case "$VERSION" in
            *-*) prerelease="--prerelease" ;;
          esac
          gh release create "$TAG" \
            --target "$GITHUB_SHA" \
            --title "$TAG" \
            --notes-file release-notes.md \
            $prerelease \
            artifacts/Ipregistry."$VERSION".nupkg \
            artifacts/Ipregistry."$VERSION".snupkg
          echo "Released $TAG: ${{ github.server_url }}/${{ github.repository }}/releases/tag/$TAG"
